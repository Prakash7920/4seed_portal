<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - 4Seed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <div class="dashboard-welcome">

        <h2>Welcome Back 👋</h2>

        <h3 id="partnerName">Loading...</h3>

        <p>
            Partner ID :
            <span id="partnerId">Loading...</span>
        </p>

        <p>
            Sponsor :
            <span id="sponsorName">Loading...</span>
        </p>

    </div>

    <div class="dashboard-grid">

        <div class="dashboard-card"
onclick="window.location='idcard.html'">
🪪
<h3>Digital ID</h3>

        </div>

        <div class="dashboard-card"
onclick="window.location='team.html'">
👥
<h3>My Team</h3>

        </div>

        <div class="dashboard-card"
onclick="window.location='referral.html'">
🔗
<h3>Referral</h3>

        </div>

        <div class="dashboard-card"
onclick="window.location='rank.html'">
🏆
<h3>My Rank</h3>

        </div>

        <div class="dashboard-card" id="logoutBtn">
            🚪
            <h3>Logout</h3>
        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>

<div class="dashboard-container">

</div>

</body>

<div class="dashboard">

    <div class="welcome-card">

        <h2 id="welcomeName">Welcome 👋</h2>

        <p id="partnerInfo"></p>

    </div>

    <div class="dashboard-grid">

        <div class="card">
            <i class="fas fa-users"></i>
            <h3>My Team</h3>
            <span id="teamCount">0</span>
        </div>

        <div class="card">
            <i class="fas fa-wallet"></i>
            <h3>Wallet</h3>
            <span>₹0</span>
        </div>

        <div class="card">
            <i class="fas fa-trophy"></i>
            <h3>Rank</h3>
            <span>Starter</span>
        </div>

        <div class="card">
            <i class="fas fa-chart-line"></i>
            <h3>Business</h3>
            <span>₹0</span>
        </div>

        <div class="card">
            <i class="fas fa-id-card"></i>
            <h3>My ID Card</h3>
        </div>

        <div class="card">
            <i class="fas fa-cog"></i>
            <h3>Settings</h3>
        </div>

    </div>

</div>
    
</html>
