<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Seed Admin Panel</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">

    <h1>🌱 4Seed Admin Panel</h1>

    <div class="stats">

        <div class="stat-card">
            <h3 id="totalPartners">0</h3>
            <p>Total Partners</p>
        </div>

        <div class="stat-card">
            <h3 id="activePartners">0</h3>
            <p>Active</p>
        </div>

        <div class="stat-card">
            <h3 id="blockedPartners">0</h3>
            <p>Blocked</p>
        </div>

        <div class="stat-card">
            <h3 id="walletAmount">₹0</h3>
            <p>Total Wallet</p>
        </div>

    </div>

    <br>

    <input
        type="text"
        id="searchBox"
        placeholder="Search Partner..."
        onkeyup="searchPartner()">

    <br><br>

    <table id="partnerTable" border="1" width="100%">
        <thead>
            <tr>
                <th>Partner ID</th>
                <th>Name</th>
                <th>Wallet</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        </tbody>
    </table>

    <br><br>

    <h2>Withdrawal Requests</h2>

    <table id="withdrawTable" border="1" width="100%">
        <thead>
            <tr>
                <th>Request ID</th>
                <th>Partner ID</th>
                <th>Name</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        </tbody>
    </table>

</div>
<!-- Edit Partner Popup -->
<div id="editPopup" class="popup">

    <div class="popup-content">

        <h2>Edit Partner</h2>

        <input type="hidden" id="editPartnerId">

        <label>Partner Name</label>
        <input type="text" id="editName">

        <label>Wallet Amount</label>
        <input type="number" id="editWallet">

        <div class="popup-buttons">
            <button onclick="savePartner()">💾 Save</button>
            <button onclick="closePopup()">❌ Cancel</button>
        </div>

    </div>

</div>
<script src="js/admin.js"></script>

</body>
</html>
