<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

4Seed Partner Registration

</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="register-container">

<!-- Header -->

<div class="page-header">

<div class="logo">

🌱 4Seed

</div>

<h1>

Partner Registration

</h1>

<p>

Join the 4Seed Partner Network

</p>

</div>

<!-- Progress -->

<div class="progress-wrapper">

<div class="progress-top">

<span id="stepText">

Step 1 of 3

</span>

<span id="progressText">

33%

</span>

</div>

<div class="progress-bar">

<div
id="progressFill"
class="progress-fill">

</div>

</div>

</div>

<!-- Step Indicator -->

<div class="step-indicator">

<div class="step active">

<div class="circle">

1

</div>

<p>

Sponsor

</p>

</div>

<div class="line">

</div>

<div class="step">

<div class="circle">

2

</div>

<p>

Personal

</p>

</div>

<div class="line">

</div>

<div class="step">

<div class="circle">

3

</div>

<p>

Review

</p>

</div>

</div>

<!-- Step 1 -->

<div
id="step1"
class="form-step active">

<h2>

Sponsor Information

</h2>

<label>

Sponsor ID

</label>

<input

type="text"

id="sponsorId"

placeholder="Enter Sponsor ID"

autocomplete="off">

<label>

Sponsor Full Name

</label>

<input

type="text"

id="sponsorName"

placeholder="Auto Verified"

readonly>

<div id="status">

</div>

<div class="button-group">

<button
id="nextStep1">

Next →

</button>

</div>

</div>
